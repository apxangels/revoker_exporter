port: 9969
max_workers: 10

# How often to re-check revocation status
refresh_ocsp_seconds: 3600   # 1 hour
refresh_crl_seconds: 21600   # 6 hours (also bounded by CRL next_update)
refresh_error_seconds: 300   # 5 minutes after any failure

# Network timeouts (seconds)
connect_timeout: 30
http_timeout: 30

# How long the /probe endpoint will block waiting for the first check result.
# Set to 0 to return immediately (legacy PENDING behaviour).
probe_wait_timeout: 120

# Modules define check behaviour. Select via ?module=<name> in /probe requests.
#
# proto:
#   tcp   — plain TLS handshake (default); default port 443
#   smtp  — SMTP STARTTLS on port 25 (default port 25, override with host:port)
#
# mode:
#   both  — СRL primary, OSCP fallback (default)
#   ocsp  — OCSP only, no CRL 
#   crl   — CRL only, no OCSP
#
# insecure:
#   false — verify TLS certificate chain (default)
#   true  — skip chain verification (use when issuer CA is absent from local bundle)
#
# Target formats accepted by /probe:
#   host             →  port from module default (443 tcp / 25 smtp)
#   host:port        →  explicit port, overrides module default
#   host/path        →  path is stripped, only host is used
#   https://host/p   →  scheme and path are stripped
modules:
  default:
    mode: both
    insecure: false

  insecure:
    mode: both
    insecure: true

  ocsp_only:
    mode: ocsp
    insecure: false

  crl_only:
    mode: crl
    insecure: false

  insecure_ocsp:
    mode: ocsp
    insecure: true

  insecure_crl:
    mode: crl
    insecure: true

  smtp:
    proto: smtp
    mode: both
    insecure: false

  smtp_insecure:
    proto: smtp
    mode: both
    insecure: true

  smtp_ocsp:
    proto: smtp
    mode: ocsp
    insecure: false

  smtp_crl:
    proto: smtp
    mode: crl
    insecure: false
